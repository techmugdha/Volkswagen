<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error Handling in JS</title>
  </head>
  <body>
    <script>
      try {
        var x = 5;
        if (x % 2 !== 0) throw 'Not an even number!!';
      } catch (error) {
        console.log(error);
      } finally {
        console.log('The code is finally over..');
      }
    </script>
  </body>
</html>
