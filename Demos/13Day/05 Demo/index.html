<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS</title>
    <style>
      .slide-away {
        opacity: 0;
        transform: translateX(20px);
        animation: slideFade 0.6s ease-out forwards;
        position: relative;
        font-weight: bold;
        color: rgb(14, 114, 114);
        margin: 10px;
      }

      /* @keyframes- rule is used to control the steps in animation sequence */

      @keyframes slideFade {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <button id="btn1">Say Hi</button>
    <script src="script.js"></script>
  </body>
</html>
